# Self-hosted Postgres for Trendex — replaces Neon (free-tier compute quota).
# StatefulSet + PVC (local-path) + ClusterIP service.
# DB: trendex, user: trendex_owner.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trendex-postgres-data
  namespace: trendex
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: trendex-postgres-secret
  namespace: trendex
type: Opaque
stringData:
  POSTGRES_USER: trendex_owner
  POSTGRES_PASSWORD: "f055b85bb624d055f4b8d2c3439e883f5f4b7ff7e337347e"
  POSTGRES_DB: trendex
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trendex-postgres
  namespace: trendex
  labels: { app: trendex-postgres }
spec:
  replicas: 1
  strategy: { type: Recreate }   # single PVC — can't run two pods at once
  selector:
    matchLabels: { app: trendex-postgres }
  template:
    metadata:
      labels: { app: trendex-postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef: { name: trendex-postgres-secret }
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "trendex_owner", "-d", "trendex"] }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec: { command: ["pg_isready", "-U", "trendex_owner", "-d", "trendex"] }
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: trendex-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: trendex-postgres
  namespace: trendex
spec:
  selector: { app: trendex-postgres }
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None    # headless — stable DNS: trendex-postgres.trendex.svc.cluster.local
