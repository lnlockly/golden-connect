---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trendex-bot
  namespace: trendex
  labels:
    app: trendex-bot
spec:
  replicas: 1
  strategy:
    type: Recreate  # long-poller — only one process should own the update stream
  selector:
    matchLabels:
      app: trendex-bot
  template:
    metadata:
      labels:
        app: trendex-bot
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: trendex-bot
          image: ghcr.io/lnlockly/trendex-bot:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: trendex-bot-env
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 1m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: trendex-bot
  namespace: trendex
spec:
  selector:
    app: trendex-bot
  ports:
    - name: http
      port: 8080
      targetPort: http
