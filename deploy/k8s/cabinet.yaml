apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: golden-connect-cabinet-data
  namespace: golden-connect
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: golden-connect-cabinet
  namespace: golden-connect
  labels:
    app: golden-connect-cabinet
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: golden-connect-cabinet
  template:
    metadata:
      labels:
        app: golden-connect-cabinet
    spec:
      imagePullSecrets:
      - name: ghcr-pull
      containers:
      - name: golden-connect-cabinet
        image: ghcr.io/lnlockly/golden-connect-cabinet:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3810
        envFrom:
        - secretRef:
            name: golden-connect-cabinet-env
        env:
        - name: DATA_DIR
          value: /data
        - name: PORT
          value: '3810'
        - name: NODE_ENV
          value: production
        - name: BASE_PATH
          value: /cabinet
        - name: CABINET_BOT_POLL_DISABLED
          value: '0'
        volumeMounts:
        - name: data
          mountPath: /data
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 8
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 6
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1500m
            memory: 768Mi
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: golden-connect-cabinet-data
---
apiVersion: v1
kind: Service
metadata:
  name: golden-connect-cabinet
  namespace: golden-connect
spec:
  selector:
    app: golden-connect-cabinet
  ports:
  - name: http
    port: 80
    targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: golden-connect-cabinet
  namespace: golden-connect
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/proxy-read-timeout: '60'
