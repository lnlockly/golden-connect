apiVersion: apps/v1
kind: Deployment
metadata:
  name: golden-connect-landing
  namespace: golden-connect
  labels:
    app: golden-connect-landing
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: golden-connect-landing
  template:
    metadata:
      labels:
        app: golden-connect-landing
    spec:
      imagePullSecrets:
      - name: ghcr-pull
      containers:
      - name: golden-connect-landing
        image: ghcr.io/lnlockly/golden-connect-landing:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          requests:
            cpu: 5m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: golden-connect-landing
  namespace: golden-connect
spec:
  selector:
    app: golden-connect-landing
  ports:
  - name: http
    port: 80
    targetPort: http
---
# Landing ingress: pure / pass-through to nginx, NO rewrite-target
# (rewrite-target would apply to every path in this ingress and turn
# /favicon.svg, /og.jpg, /golden-connect-hero-logo.svg, etc into / →
# SPA index.html. /api lives in a separate ingress below.)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: golden-connect-landing
  namespace: golden-connect
  annotations:
    nginx.ingress.kubernetes.io/from-to-www-redirect: 'true'
spec:
  ingressClassName: nginx
  rules:
  - host: golden-connect.top
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: golden-connect-landing
            port:
              number: 80
---
# Separate API ingress with regex rewrite — only this one gets the
# rewrite-target annotation so it doesn't leak onto static asset paths.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: golden-connect-api-path
  namespace: golden-connect
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: 'true'
spec:
  ingressClassName: nginx
  rules:
  - host: golden-connect.top
    http:
      paths:
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: golden-connect-api
            port:
              number: 4001
