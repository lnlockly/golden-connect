apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: golden-connect-cabinet
  namespace: golden-connect
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
  - host: golden-connect.to
    http:
      paths:
      # ─── SPA / cabinet shell ───
      - { path: /cabinet,           pathType: Prefix, backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }
      - { path: /bio,               pathType: Prefix, backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }
      - { path: /s,                 pathType: Prefix, backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }
      - { path: /hub,               pathType: Prefix, backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }
      - { path: /sitemap-bio.xml,   pathType: Exact,  backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }
      - { path: /trdx,              pathType: Exact,  backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }

      # ─── public marketing pages served by cabinet ───
      - { path: /faq,               pathType: Exact,  backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }
      - { path: /reviews,           pathType: Exact,  backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }
      - { path: /media,             pathType: Prefix, backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }
      - { path: /landings,          pathType: Exact,  backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }
      - { path: /product,           pathType: Prefix, backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }
      - { path: /products-library,  pathType: Exact,  backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }
      - { path: /landing,           pathType: Prefix, backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }

      # ─── auth pages ───
      - { path: /login,             pathType: Exact,  backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }
      - { path: /register,          pathType: Exact,  backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }
      - { path: /auth/magic,        pathType: Prefix, backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }

      # ─── SEO ───
      - { path: /sitemap.xml,       pathType: Exact,  backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }
      - { path: /robots.txt,        pathType: Exact,  backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }

      # ─── short links / banner redirects ───
      - { path: /r/banner,          pathType: Prefix, backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }
      - { path: /ads-asset,         pathType: Prefix, backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }

      # ─── TG Neuro AI API (cabinet proxies to roboai-engine) ───
      - { path: /api/roboai,        pathType: Prefix, backend: { service: { name: golden-connect-cabinet, port: { number: 80 } } } }
