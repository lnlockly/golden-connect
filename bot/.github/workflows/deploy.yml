name: Build & Deploy Bot

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-bot
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/trendex-bot

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ vars.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Apply manifest + rollout
        env:
          SHA: ${{ github.sha }}
        run: |
          scp k8s/deployment.yaml ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}:/tmp/trendex-bot.yaml
          ssh ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }} "
            set -e
            kubectl apply -f /tmp/trendex-bot.yaml
            kubectl -n franchise-factory set image deploy/trendex-bot \
              trendex-bot=${{ env.IMAGE }}:${SHA}
            kubectl -n franchise-factory rollout status deploy/trendex-bot --timeout=3m
          "
