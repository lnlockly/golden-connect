apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: golden-connect-bot-data
  namespace: franchise-factory
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
# The Secret `golden-connect-bot-env` is managed out-of-band, NOT by this manifest,
# so that a `kubectl apply` from CI doesn't overwrite a real BOT_TOKEN with a
# placeholder. Create/update it once per environment:
#   kubectl -n franchise-factory create secret generic golden-connect-bot-env \
#     --from-literal=BOT_TOKEN='...' \
#     --from-literal=ADMIN_TG_ID='1361064246' \
#     --from-literal=BOT_USERNAME='AIGolden Connect_bot' \
#     --from-literal=DATABASE_PATH='/data/golden-connect.db' \
#     --from-literal=NODE_ENV='production' \
#     --from-literal=LOG_LEVEL='info' \
#     --dry-run=client -o yaml | kubectl apply -f -
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: golden-connect-bot
  namespace: franchise-factory
spec:
  replicas: 1
  strategy:
    type: Recreate  # SQLite — single writer
  selector:
    matchLabels:
      app: golden-connect-bot
  template:
    metadata:
      labels:
        app: golden-connect-bot
    spec:
      containers:
        - name: golden-connect-bot
          image: ghcr.io/lnlockly/golden-connect-bot:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: golden-connect-bot-env
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: golden-connect-bot-data
---
apiVersion: v1
kind: Service
metadata:
  name: golden-connect-bot
  namespace: franchise-factory
spec:
  selector:
    app: golden-connect-bot
  ports:
    - name: http
      port: 8080
      targetPort: http
