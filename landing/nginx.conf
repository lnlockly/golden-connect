server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # New static Russian landing — served ONLY on "/" (exact match).
    # All other routes fall through to the React SPA below.
    location = / {
        try_files /home.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /home.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Long cache for immutable assets emitted by Vite (hashed filenames).
    location /assets/ {
        access_log off;
        expires    1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files  $uri =404;
    }

    # Never cache the HTML shell — it pins the asset hashes.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }


    location = /presentation {
        try_files /presentation.html =404;
        add_header Cache-Control "no-cache";
    }

    location = /presentation.html {
        add_header Cache-Control "no-cache";
    }

    # Golden Connect landings showcase — public /landings → landings.html
    location = /landings {
        try_files /landings.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /landings.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /landing-registry.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
    }
    # Admin panel is served by cabinet pod at /cabinet/admin
    location = /admin {
        return 302 /cabinet/admin;
    }
    location = /admin/ {
        return 302 /cabinet/admin;
    }

    # SPA fallback: /account, /app, /app/* and any unknown path → React index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Silence noisy favicons / robots if not present.
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }
}
