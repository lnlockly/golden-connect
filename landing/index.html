    <!-- Splash screen styles — inline so they apply before any
         external CSS loads. Removed by main.tsx once React mounts. -->
    <style>
      html, body { margin: 0; background: #0d0f14; color: #e4e6ea; }
      #af-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0d0f14;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 36px;
        pointer-events: none;
        transition: opacity 480ms ease;
      }
      #af-splash.af-splash--leaving { opacity: 0; }
      .af-splash-wave {
        display: flex;
        align-items: flex-end;
        gap: 4px;
        height: 120px;
      }
      .af-splash-wave span {
        display: block;
        width: 4px;
        height: 100%;
        background: linear-gradient(180deg, #10b981 0%, #1f2432 70%, #161922 100%);
        border-radius: 2px;
        transform-origin: center;
        transform: scaleY(0.35);
        opacity: 0.55;
        animation: af-splash-pulse 2.4s ease-in-out infinite;
      }
      .af-splash-wave span:nth-child(3n)  { animation-duration: 2.0s; }
      .af-splash-wave span:nth-child(5n)  { animation-duration: 3.1s; }
      .af-splash-wave span:nth-child(7n)  { animation-duration: 2.3s; }
      .af-splash-wave span:nth-child(11n) { animation-duration: 3.6s; }
      .af-splash-wave span:nth-child(13n) { animation-duration: 1.9s; }
      .af-splash-wave span:nth-child(17n) { animation-duration: 2.8s; }
      .af-splash-wave span:nth-child(19n) { animation-duration: 3.3s; }
      @keyframes af-splash-pulse {
        0%, 100% { transform: scaleY(0.35); opacity: 0.5; }
        25%      { transform: scaleY(0.80); opacity: 0.65; }
        50%      { transform: scaleY(0.55); opacity: 0.55; }
        75%      { transform: scaleY(0.98); opacity: 0.72; }
      }
      .af-splash-label {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: #10b981;
        opacity: 0.75;
      }
      @media (prefers-reduced-motion: reduce) {
        .af-splash-wave span { animation: none; transform: scaleY(0.6); }
      }
    </style>
