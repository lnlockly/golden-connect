<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Monar">
  <defs>
    <linearGradient id="goldRich" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#fff3b0"/>
      <stop offset="35%" stop-color="#f4d36a"/>
      <stop offset="70%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8a6d1a"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#3a2c0a"/>
      <stop offset="100%" stop-color="#1a1206"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#d4af37" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#d4af37" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Soft golden halo -->
  <rect width="600" height="600" fill="url(#centerGlow)"/>

  <!-- Outer dashed ring -->
  <circle cx="300" cy="300" r="270" fill="none" stroke="#d4af37" stroke-width="1" stroke-dasharray="3 10" opacity="0.4"/>

  <!-- Coin body -->
  <circle cx="300" cy="300" r="215" fill="url(#goldDark)" stroke="url(#goldRich)" stroke-width="4"/>
  <circle cx="300" cy="300" r="200" fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.5"/>

  <!-- Big monogram M, bold -->
  <g filter="url(#goldGlow)">
    <text x="300" y="370" text-anchor="middle"
          font-family="'Space Grotesk', 'Inter', sans-serif"
          font-size="260"
          font-weight="900"
          fill="url(#goldRich)"
          letter-spacing="-10">M</text>
  </g>

  <!-- 5 stream dots around coin -->
  <g fill="#d4af37">
    <circle cx="300" cy="58"  r="6" opacity="0.9"/>
    <circle cx="530" cy="225" r="6" opacity="0.85"/>
    <circle cx="445" cy="490" r="6" opacity="0.8"/>
    <circle cx="155" cy="490" r="6" opacity="0.8"/>
    <circle cx="70"  cy="225" r="6" opacity="0.85"/>
  </g>
</svg>
