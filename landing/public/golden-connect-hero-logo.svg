<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Monar / Golden Connect">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#1a1206" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#0a0a0a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4d36a"/>
      <stop offset="45%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8a6d1a"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8e088"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a8862a"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background haze -->
  <rect width="600" height="600" fill="url(#bg)"/>

  <!-- Outer ring with dashed orbit -->
  <circle cx="300" cy="285" r="220" fill="none" stroke="url(#gold)" stroke-width="1.2" stroke-dasharray="2 8" opacity="0.55"/>
  <circle cx="300" cy="285" r="186" fill="none" stroke="url(#gold)" stroke-width="0.8" stroke-dasharray="1 6" opacity="0.45"/>

  <!-- Central coin -->
  <g filter="url(#softGlow)">
    <circle cx="300" cy="285" r="140" fill="#1a1206" stroke="url(#gold)" stroke-width="3"/>
    <circle cx="300" cy="285" r="128" fill="none" stroke="url(#gold)" stroke-width="0.6" opacity="0.6"/>
  </g>

  <!-- Monogram M (large) -->
  <g filter="url(#glow)">
    <text x="300" y="298" text-anchor="middle"
          font-family="'Space Grotesk', 'Geist', sans-serif"
          font-size="160"
          font-weight="800"
          fill="url(#goldText)"
          letter-spacing="-4">M</text>
  </g>

  <!-- Wordmark below coin -->
  <text x="300" y="490" text-anchor="middle"
        font-family="'Space Grotesk', 'Geist', sans-serif"
        font-size="56"
        font-weight="800"
        fill="url(#goldText)"
        letter-spacing="14">MONAR</text>

  <!-- Subtitle -->
  <text x="300" y="528" text-anchor="middle"
        font-family="'Space Grotesk', sans-serif"
        font-size="15"
        font-weight="500"
        fill="#a8862a"
        opacity="0.85"
        letter-spacing="8">GOLDEN · CONNECT</text>

  <!-- 5 streams dots (around coin, evenly) -->
  <g fill="url(#gold)" opacity="0.85">
    <circle cx="300" cy="65" r="5"/>
    <circle cx="510" cy="200" r="5"/>
    <circle cx="430" cy="430" r="5"/>
    <circle cx="170" cy="430" r="5"/>
    <circle cx="90"  cy="200" r="5"/>
  </g>
</svg>
