name: Build & Deploy golden-connect

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: "Build & deploy all services regardless of changed paths"
        required: false
        default: "false"

concurrency:
  group: deploy-golden-connect
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: lnlockly
  NAMESPACE: golden-connect

jobs:
  changes:
    runs-on: [self-hosted, golden-connect]
    outputs:
      api: ${{ steps.filter.outputs.api }}
      bot: ${{ steps.filter.outputs.bot }}
      landing: ${{ steps.filter.outputs.landing }}
      cabinet: ${{ steps.filter.outputs.cabinet }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            bot:
              - 'bot/**'
            landing:
              - 'landing/**'
            cabinet:
              - 'cabinet/**'
            infra:
              - 'deploy/k8s/**'
              - '.github/workflows/deploy.yml'

  build:
    needs: changes
    runs-on: [self-hosted, golden-connect]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: ./api
            image: golden-connect-api
            changed: ${{ needs.changes.outputs.api }}
          - name: bot
            context: ./bot
            image: golden-connect-bot
            changed: ${{ needs.changes.outputs.bot }}
          - name: landing
            context: ./landing
            image: golden-connect-landing
            changed: ${{ needs.changes.outputs.landing }}
          - name: cabinet
            context: ./cabinet
            image: golden-connect-cabinet
            changed: ${{ needs.changes.outputs.cabinet }}
    steps:
      - name: Skip (no changes)
        if: matrix.changed != 'true' && github.event.inputs.force != 'true'
        run: echo "No changes in ${{ matrix.name }} — skipping build."

      - uses: actions/checkout@v4
        if: matrix.changed == 'true' || github.event.inputs.force == 'true'

      - uses: docker/setup-buildx-action@v3
        if: matrix.changed == 'true' || github.event.inputs.force == 'true'

      - uses: docker/login-action@v3
        if: matrix.changed == 'true' || github.event.inputs.force == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.name }}
        if: matrix.changed == 'true' || github.event.inputs.force == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    needs: [changes, build]
    runs-on: [self-hosted, golden-connect]
    if: always() && needs.build.result != 'failure' && needs.build.result != 'cancelled'
    steps:
      - uses: actions/checkout@v4

      - name: Apply manifests + roll out
        env:
          SHA: ${{ github.sha }}
          API_CHANGED: ${{ needs.changes.outputs.api }}
          BOT_CHANGED: ${{ needs.changes.outputs.bot }}
          LANDING_CHANGED: ${{ needs.changes.outputs.landing }}
          CABINET_CHANGED: ${{ needs.changes.outputs.cabinet }}
          FORCE: ${{ github.event.inputs.force }}
          NS: ${{ env.NAMESPACE }}
        run: |
          set -euo pipefail
          REG="${REGISTRY}/${OWNER}"

          # 0. Drop stale ingresses left over from earlier manifests that now
          #    collide with the consolidated landing ingress (path /api on
          #    golden-connect.top). Idempotent: --ignore-not-found.
          kubectl -n "$NS" delete ingress golden-connect-api-path --ignore-not-found
          kubectl -n "$NS" delete ingress golden-connect-api --ignore-not-found

          # 1. Manifests are idempotent; apply every run so infra changes land.
          kubectl apply -f deploy/k8s/

          # 2. Pin images to this commit for whichever services changed.
          roll() {
            local svc="$1"
            kubectl -n "$NS" set image "deploy/golden-connect-${svc}" \
              "golden-connect-${svc}=${REG}/golden-connect-${svc}:${SHA}" \
              --record=false
            kubectl -n "$NS" rollout status "deploy/golden-connect-${svc}" --timeout=4m
          }

          if [ "${API_CHANGED}" = "true" ] || [ "${FORCE}" = "true" ]; then roll api; fi
          if [ "${BOT_CHANGED}" = "true" ] || [ "${FORCE}" = "true" ]; then roll bot; fi
          if [ "${LANDING_CHANGED}" = "true" ] || [ "${FORCE}" = "true" ]; then roll landing; fi
          if [ "${CABINET_CHANGED}" = "true" ] || [ "${FORCE}" = "true" ]; then roll cabinet; fi
